version: '3.8'

services:
  cargoexpress:
    build: .
    container_name: cargoexpress-app
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/cargo.db
    volumes:
      - cargo-data:/app/data
    restart: unless-stopped

volumes:
  cargo-data:
    driver: local